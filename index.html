<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Royal Cyber Casino</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <!-- Socket.IO Клиент -->
    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-main: #070913;
            --card-bg: rgba(20, 27, 45, 0.75);
            --accent-gold: #ffd700;
            --accent-neon: #c084fc;
            --accent-green: #10b981;
            --accent-red: #f43f5e;
            --text-light: #f8fafc;
            --glass-border: rgba(255, 255, 255, 0.12);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; user-select: none; }

        body {
            font-family: 'Outfit', sans-serif;
            background: radial-gradient(circle at 50% -20%, #311042, #0c1021, #05070e);
            color: var(--text-light);
            min-height: 100vh;
            padding: 10px;
            display: flex;
            flex-direction: column;
            overflow-x: hidden;
        }

        /* Header */
        .header {
            display: flex; justify-content: space-between; align-items: center;
            background: rgba(18, 24, 43, 0.85); backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 215, 0, 0.2); padding: 8px 14px;
            border-radius: 20px; margin-bottom: 10px; box-shadow: 0 10px 30px rgba(0,0,0,0.6);
        }

        .user-box { display: flex; align-items: center; gap: 8px; }
        .avatar {
            width: 36px; height: 36px; border-radius: 50%;
            background: linear-gradient(135deg, #ffd700, #f59e0b);
            color: #000; font-weight: 900; display: flex; align-items: center; justify-content: center;
            box-shadow: 0 0 14px rgba(255, 215, 0, 0.5); font-size: 16px;
        }
        .balance {
            background: radial-gradient(circle, rgba(255, 215, 0, 0.15), rgba(0,0,0,0.6));
            border: 1.5px solid var(--accent-gold); padding: 4px 12px; border-radius: 18px;
            color: var(--accent-gold); font-weight: 800; font-size: 14px; display: flex; align-items: center; gap: 6px;
        }

        .view { display: none; flex-direction: column; gap: 10px; }
        .view.active { display: flex; }

        .section-title { 
            font-size: 12px; font-weight: 800; text-transform: uppercase; 
            letter-spacing: 1.2px; color: #94a3b8; margin: 2px 0; text-align: center;
        }

        /* CIRCLE GAMES GRID */
        .circle-games-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 12px;
            justify-items: center;
            align-items: center;
            padding: 2px 0;
        }

        .circle-game-btn {
            width: 110px; height: 110px; border-radius: 50%;
            background: radial-gradient(circle at 30% 30%, rgba(30, 41, 59, 0.9), rgba(15, 23, 42, 0.95));
            border: 2px solid var(--glass-border);
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            gap: 2px; text-align: center; cursor: pointer;
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.27);
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.5);
        }
        .circle-game-btn:active { transform: scale(0.92); }
        .circle-game-btn.poker { border-color: rgba(96, 165, 250, 0.6); }
        .circle-game-btn.bj { border-color: rgba(255, 215, 0, 0.6); }
        .circle-game-btn.slots { border-color: rgba(236, 72, 153, 0.6); }
        .circle-game-btn.roulette { border-color: rgba(239, 68, 68, 0.6); }
        .circle-game-btn.dice { border-color: rgba(168, 85, 247, 0.6); }

        .circle-icon { font-size: 28px; display: inline-block; }

        /* CENTER HERO */
        .center-casino-hero {
            grid-column: span 2; display: flex; flex-direction: column;
            align-items: center; justify-content: center; padding: 6px 0;
        }

        .hero-icon-animated {
            font-size: 46px;
            filter: drop-shadow(0 0 20px rgba(255, 215, 0, 0.6));
            animation: floatAnimation 3s ease-in-out infinite;
        }

        .hero-badge {
            background: linear-gradient(135deg, rgba(255, 215, 0, 0.2), rgba(192, 132, 252, 0.2));
            border: 1px solid var(--accent-gold); padding: 2px 10px; border-radius: 12px;
            font-size: 10px; font-weight: 800; color: var(--accent-gold); letter-spacing: 1px;
        }

        @keyframes floatAnimation {
            0%, 100% { transform: translateY(0px) rotate(0deg) scale(1); }
            50% { transform: translateY(-8px) rotate(3deg) scale(1.08); }
        }

        .circle-name { font-weight: 800; font-size: 11px; color: #f8fafc; line-height: 1.1; }

        /* MULTIPLAYER BANNER */
        .multiplayer-banner {
            background: linear-gradient(135deg, #059669, #047857);
            border-radius: 18px; padding: 10px 14px; display: flex; justify-content: space-between; align-items: center;
            box-shadow: 0 8px 20px rgba(16, 185, 129, 0.3); border: 1px solid rgba(255,255,255,0.2);
        }

        .btn {
            background: linear-gradient(135deg, #f59e0b, #d97706); color: white; border: none; padding: 10px 16px;
            border-radius: 14px; font-weight: 800; cursor: pointer; font-family: inherit; transition: all 0.15s;
            box-shadow: 0 5px 15px rgba(245, 158, 11, 0.35); font-size: 13px; text-align: center;
        }
        .btn:active { transform: scale(0.96); }
        .btn-secondary { background: rgba(255, 255, 255, 0.08); border: 1px solid var(--glass-border); box-shadow: none; }
        .btn-green { background: linear-gradient(135deg, #10b981, #059669); }
        .btn-blue { background: linear-gradient(135deg, #3b82f6, #1d4ed8); }

        /* MULTIPLAYER TABLE */
        .poker-multi-table-square {
            width: 100%; max-width: 300px; height: 200px;
            background: radial-gradient(circle, #065f46, #022c22); border-radius: 20px;
            border: 3px solid #059669; box-shadow: inset 0 0 20px rgba(0,0,0,0.8);
            position: relative; display: flex; flex-direction: column; align-items: center; justify-content: center; margin: 15px auto;
        }

        .seat {
            position: absolute; width: 50px; height: 50px; background: rgba(15, 23, 42, 0.95);
            border: 2px solid var(--accent-gold); border-radius: 14px; display: flex; flex-direction: column;
            align-items: center; justify-content: center; font-size: 10px; font-weight: 800; color: #fff;
            box-shadow: 0 4px 10px rgba(0,0,0,0.5);
        }
        .seat.s1 { bottom: -20px; } 
        .seat.s2 { left: -20px; top: 50%; transform: translateY(-50%); }
        .seat.s3 { top: -20px; left: 15%; } 
        .seat.s4 { top: -20px; right: 15%; }
        .seat.s5 { right: -20px; top: 50%; transform: translateY(-50%); }
        .seat.empty { border-color: rgba(255,255,255,0.2); color: rgba(255,255,255,0.4); }

        .playing-card {
            width: 34px; height: 48px; background: #fff; border-radius: 5px; color: #1e293b;
            display: flex; flex-direction: column; justify-content: space-between; padding: 2px; font-weight: 900; font-size: 10px;
        }
        .playing-card.red { color: #f43f5e; }
        .cards-row { display: flex; gap: 4px; justify-content: center; margin-top: 4px; }
    </style>
</head>
<body>

    <!-- Header -->
    <div class="header">
        <div class="user-box">
            <div class="avatar" id="userAvatar">А</div>
            <span id="userName" style="font-weight:800; font-size:14px;">Артур</span>
        </div>
        <div class="balance">🪙 <span id="balanceText">1000</span></div>
    </div>

    <!-- VIEW 1: Main Menu -->
    <div class="view active" id="viewMenu">
        <div class="multiplayer-banner">
            <div>
                <div style="font-weight:900; font-size:13px;">👥 Онлайн Мультиплеер</div>
                <div style="font-size:10px; opacity:0.9;">Покер с живыми игроками</div>
            </div>
            <button class="btn btn-green" onclick="openMultiplayerLobby()">Войти</button>
        </div>

        <div class="section-title">♠️ Выберите Игру 🎰</div>

        <div class="circle-games-grid">
            <!-- 1. Онлайн Покер -->
            <div class="circle-game-btn poker" onclick="openMultiplayerLobby()">
                <div class="circle-icon">🌐</div>
                <div class="circle-name">Онлайн<br>Покер</div>
            </div>

            <!-- 2. Блэкджек -->
            <div class="circle-game-btn bj" onclick="alert('Запуск Блэкджека!')">
                <div class="circle-icon">🃏</div>
                <div class="circle-name">Блэкджек<br>21</div>
            </div>

            <!-- Центральный элемент -->
            <div class="center-casino-hero">
                <div class="hero-icon-animated">👑</div>
                <div class="hero-badge">ROYAL CLUB</div>
            </div>

            <!-- 3. Слоты -->
            <div class="circle-game-btn slots" onclick="alert('Запуск Игровых Автоматов!')">
                <div class="circle-icon">🎰</div>
                <div class="circle-name">Слоты<br>777</div>
            </div>

            <!-- 4. Рулетка -->
            <div class="circle-game-btn roulette" onclick="alert('Запуск Рулетки!')">
                <div class="circle-icon">🎡</div>
                <div class="circle-name">Рулетка<br>Live</div>
            </div>

            <!-- 5. Кости (Dice) -->
            <div class="circle-game-btn dice" style="grid-column: span 2;" onclick="alert('Запуск Игры в Кости!')">
                <div class="circle-icon">🎲</div>
                <div class="circle-name">Кости / Craps</div>
            </div>
        </div>
    </div>

    <!-- VIEW 2: Multiplayer Lobby & Table -->
    <div class="view" id="viewLobby">
        <div class="section-title">Онлайн Стол #<span id="roomCode">777</span></div>
        <div id="connectionStatus" style="text-align:center; font-size:11px; color:#10b981;">● Подключено к VPS (5.181.21.243)</div>

        <div class="poker-multi-table-square">
            <div style="font-weight:900; font-size: 12px; color:var(--accent-gold);">БАНК: <span id="tablePot">0</span> 🪙</div>
            
            <!-- Общие карты на столе -->
            <div class="cards-row" id="tableCommunityCards"></div>

            <!-- Места игроков -->
            <div class="seat s1 empty" id="seat0">Пусто</div>
            <div class="seat s2 empty" id="seat1">Пусто</div>
            <div class="seat s3 empty" id="seat2">Пусто</div>
            <div class="seat s4 empty" id="seat3">Пусто</div>
            <div class="seat s5 empty" id="seat4">Пусто</div>
        </div>

        <button class="btn btn-blue" id="btnStartMulti" style="width: 100%; margin-top: 4px;" onclick="requestStartGame()">▶ Начать раздачу</button>
        <button class="btn btn-secondary" style="width: 100%;" onclick="showView('viewMenu')">⬅ В главное меню</button>
    </div>

    <script>
        const tg = window.Telegram?.WebApp;
        if (tg) { tg.ready(); tg.expand(); }

        let myName = "Артур";
        if (tg?.initDataUnsafe?.user) {
            myName = tg.initDataUnsafe.user.first_name;
            document.getElementById('userName').innerText = myName;
            document.getElementById('userAvatar').innerText = myName[0].toUpperCase();
        }

        function showView(viewId) {
            document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
            document.getElementById(viewId).classList.add('active');
        }

        /* --- SOCKET.IO СЕРВЕР (Твой VPS) --- */
        document.getElementById('connectionStatus').innerText = "● Подключено к VPS (5.181.21.243)"; 
        let socket = null;
        let currentRoomId = "room_1";

        function openMultiplayerLobby() {
            showView('viewLobby');
            
            if (!socket) {
                socket = io(SERVER_URL);

                socket.on('connect', () => {
                    document.getElementById('connectionStatus').innerText = "● Подключено к VPS (2.5.181.212)";
                    document.getElementById('connectionStatus').style.color = "#10b981";
                    
                    socket.emit('join_room', { roomId: currentRoomId, userName: myName, gameType: 'poker' });
                });

                socket.on('disconnect', () => {
                    document.getElementById('connectionStatus').innerText = "○ Переподключение к VPS...";
                    document.getElementById('connectionStatus').style.color = "#f43f5e";
                });

                socket.on('room_state', (room) => {
                    updateTableUI(room);
                });
            } else {
                socket.emit('join_room', { roomId: currentRoomId, userName: myName, gameType: 'poker' });
            }
        }

        function requestStartGame() {
            if (socket) {
                socket.emit('start_game', { roomId: currentRoomId });
            }
        }

        function updateTableUI(room) {
            document.getElementById('tablePot').innerText = room.pot;

            for (let i = 0; i < 5; i++) {
                const seatEl = document.getElementById(`seat${i}`);
                seatEl.className = `seat s${i+1} empty`;
                seatEl.innerHTML = "Пусто";
            }

            room.players.forEach((player, index) => {
                if (index < 5) {
                    const seatEl = document.getElementById(`seat${index}`);
                    seatEl.className = `seat s${index+1}`;
                    
                    let cardsHTML = '';
                    if (player.cards && player.cards.length > 0) {
                        cardsHTML = `<div class="cards-row">` + player.cards.map(c => `
                            <div class="playing-card ${c.isRed ? 'red' : ''}">
                                <div>${c.val}</div><div>${c.suit}</div>
                            </div>
                        `).join('') + `</div>`;
                    }

                    seatEl.innerHTML = `<div>${player.name}</div>${cardsHTML}`;
                }
            });

            const commEl = document.getElementById('tableCommunityCards');
            commEl.innerHTML = room.communityCards.map(c => `
                <div class="playing-card ${c.isRed ? 'red' : ''}">
                    <div>${c.val}</div><div>${c.suit}</div>
                </div>
            `).join('');
        }
    </script>
</body>
</html>
