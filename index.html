<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Royal Casino Hub & Multiplayer</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-main: #0f172a;
            --card-bg: rgba(30, 41, 59, 0.7);
            --accent-gold: #ffd700;
            --accent-purple: #8b5cf6;
            --text-light: #f8fafc;
            --glass-border: rgba(255, 255, 255, 0.1);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; user-select: none; }

        body {
            font-family: 'Outfit', sans-serif;
            background: radial-gradient(circle at top, #1e293b, #0f172a);
            color: var(--text-light);
            min-height: 100vh;
            padding: 12px;
            display: flex;
            flex-direction: column;
        }

        /* Top Header */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: var(--card-bg);
            backdrop-filter: blur(12px);
            border: 1px solid var(--glass-border);
            padding: 12px 16px;
            border-radius: 16px;
            margin-bottom: 16px;
        }

        .user-box { display: flex; align-items: center; gap: 10px; }
        .avatar {
            width: 38px; height: 38px; border-radius: 50%;
            background: linear-gradient(135deg, #ffd700, #f59e0b);
            color: #000; font-weight: 800; display: flex;
            align-items: center; justify-content: center;
        }

        .balance {
            background: rgba(0, 0, 0, 0.4);
            border: 1px solid rgba(255, 215, 0, 0.3);
            padding: 6px 14px; border-radius: 20px;
            color: var(--accent-gold); font-weight: 700;
        }

        /* Navigation Views */
        .view { display: none; flex-direction: column; gap: 12px; }
        .view.active { display: flex; }

        /* Game Grid Menu */
        .section-title { font-size: 18px; font-weight: 700; margin-bottom: 4px; }
        
        .games-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
        }

        .game-card {
            background: var(--card-bg);
            border: 1px solid var(--glass-border);
            border-radius: 16px;
            padding: 16px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 8px;
            text-align: center;
            cursor: pointer;
            transition: transform 0.2s, border-color 0.2s;
        }

        .game-card:active { transform: scale(0.96); }
        .game-card.featured {
            grid-column: span 2;
            background: linear-gradient(135deg, rgba(139, 92, 246, 0.3), rgba(15, 23, 42, 0.8));
            border-color: var(--accent-purple);
        }

        .game-icon { font-size: 32px; }
        .game-name { font-weight: 700; font-size: 15px; }

        /* Multiplayer Lobby Banner */
        .multiplayer-banner {
            background: linear-gradient(135deg, #10b981, #047857);
            border-radius: 16px;
            padding: 16px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 4px 15px rgba(16, 185, 129, 0.3);
        }

        .btn {
            background: linear-gradient(135deg, #f59e0b, #d97706);
            color: white; border: none; padding: 12px 20px;
            border-radius: 12px; font-weight: 700; cursor: pointer;
            font-family: inherit; transition: transform 0.15s;
        }

        .btn:active { transform: scale(0.95); }
        .btn-secondary { background: rgba(255, 255, 255, 0.1); border: 1px solid var(--glass-border); }

        /* Room Lobby UI */
        .slots-container {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 8px;
            margin: 15px 0;
        }

        .player-slot {
            aspect-ratio: 1;
            background: rgba(255,255,255,0.05);
            border: 2px dashed rgba(255,255,255,0.2);
            border-radius: 12px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-size: 11px;
            text-align: center;
        }

        .player-slot.occupied {
            border-style: solid;
            border-color: var(--accent-gold);
            background: rgba(255, 215, 0, 0.1);
        }
    </style>
</head>
<body>

    <!-- Header -->
    <div class="header">
        <div class="user-box">
            <div class="avatar" id="userAvatar">U</div>
            <span id="userName" style="font-weight:600; font-size:14px;">Игрок</span>
        </div>
        <div class="balance">🪙 <span id="balanceText">1000</span></div>
    </div>

    <!-- VIEW 1: Main Menu -->
    <div class="view active" id="viewMenu">
        <!-- Multiplayer Banner -->
        <div class="multiplayer-banner">
            <div>
                <div style="font-weight:800; font-size:16px;">👥 Комната до 5 человек</div>
                <div style="font-size:12px; opacity:0.9;">Играй с друзьями в реальном времени</div>
            </div>
            <button class="btn" onclick="openMultiplayerLobby()">Создать</button>
        </div>

        <div class="section-title">Выберите игру</div>

        <div class="games-grid">
            <div class="game-card featured" onclick="openGame('Блэкджек')">
                <div class="game-icon">🃏</div>
                <div class="game-name">Блэкджек (21 Очко)</div>
            </div>

            <div class="game-card" onclick="openGame('Покер')">
                <div class="game-icon">🎴</div>
                <div class="game-name">Техасский Покер</div>
            </div>

            <div class="game-card" onclick="openGame('Рулетка')">
                <div class="game-icon">🎡</div>
                <div class="game-name">Рулетка</div>
            </div>

            <div class="game-card" onclick="openGame('Кости')">
                <div class="game-icon">🎲</div>
                <div class="game-name">Кости (Craps)</div>
            </div>

            <div class="game-card" onclick="openGame('Слоты')">
                <div class="game-icon">🎰</div>
                <div class="game-name">Слоты 777</div>
            </div>
        </div>
    </div>

    <!-- VIEW 2: Multiplayer Room Lobby -->
    <div class="view" id="viewLobby">
        <div class="section-title">Лобби комнаты #<span id="roomCode">8842</span></div>
        <div style="font-size: 13px; opacity: 0.7;">Ожидание игроков (Макс. 5 чел)</div>

        <div class="slots-container" id="slotsContainer">
            <!-- 5 Slots generated by JS -->
        </div>

        <button class="btn" style="width: 100%; margin-top: 10px;" onclick="startMultiplayerGame()">▶ Начать игру для всех</button>
        <button class="btn btn-secondary" style="width: 100%;" onclick="showView('viewMenu')">⬅ В главное меню</button>
    </div>

    <!-- VIEW 3: Game Screen Area -->
    <div class="view" id="viewGame">
        <div style="display:flex; justify-content:space-between; align-items:center;">
            <button class="btn btn-secondary" onclick="showView('viewMenu')">⬅ Меню</button>
            <div id="currentGameTitle" style="font-weight:800; font-size:18px;">Игра</div>
        </div>

        <!-- Dynamic Game Engine Area -->
        <div id="gameEngineArea" style="min-height: 300px; background: var(--card-bg); border-radius: 16px; border: 1px solid var(--glass-border); padding: 16px; display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center;">
            <!-- Content injects here via JS -->
        </div>
    </div>

    <script>
        const tg = window.Telegram?.WebApp;
        if (tg) { tg.ready(); tg.expand(); }

        let balance = parseInt(localStorage.getItem('casino_balance')) || 1000;
        let playersInLobby = 1;

        // Init User
        if (tg?.initDataUnsafe?.user) {
            const u = tg.initDataUnsafe.user;
            document.getElementById('userName').innerText = u.first_name;
            document.getElementById('userAvatar').innerText = u.first_name[0].toUpperCase();
        }

        function showView(viewId) {
            document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
            document.getElementById(viewId).classList.add('active');
        }

        /* --- Multiplayer Room Management --- */
        function openMultiplayerLobby() {
            showView('viewLobby');
            document.getElementById('roomCode').innerText = Math.floor(1000 + Math.random() * 9000);
            renderLobbySlots();
        }

        function renderLobbySlots() {
            const container = document.getElementById('slotsContainer');
            container.innerHTML = '';
            
            for(let i = 0; i < 5; i++) {
                const slot = document.createElement('div');
                if (i < playersInLobby) {
                    slot.className = 'player-slot occupied';
                    slot.innerHTML = `👤<br>Игрок ${i+1}`;
                } else {
                    slot.className = 'player-slot';
                    slot.innerHTML = `➕<br>Пусто`;
                }
                container.appendChild(slot);
            }
        }

        function startMultiplayerGame() {
            openGame('Блэкджек (Мультиплеер)');
        }

        /* --- Game Router & Engines --- */
        function openGame(gameName) {
            showView('viewGame');
            document.getElementById('currentGameTitle').innerText = gameName;
            const area = document.getElementById('gameEngineArea');

            if (gameName.includes('Блэкджек')) {
                area.innerHTML = `
                    <h3>🃏 Блэкджек</h3>
                    <p style="margin: 15px 0; font-size:14px; opacity:0.8;">Карты раздаются на столе!</p>
                    <button class="btn" onclick="alert('Раздача карт...')">Раздать карты (100 🪙)</button>
                `;
            } else if (gameName === 'Покер') {
                area.innerHTML = `
                    <h3>🎴 Техасский Покер</h3>
                    <p style="margin: 15px 0; font-size:14px; opacity:0.8;">Ваша рука: [A♠] [K♠]</p>
                    <button class="btn" onclick="alert('Чек / Ставка')">Сделать ставку (50 🪙)</button>
                `;
            } else if (gameName === 'Рулетка') {
                area.innerHTML = `
                    <h3>🎡 Рулетка Казино</h3>
                    <div style="font-size:40px; margin:20px;">🎡</div>
                    <button class="btn" onclick="spinRoulette()">Крутить (Красное - 100 🪙)</button>
                `;
            } else if (gameName === 'Кости') {
                area.innerHTML = `
                    <h3>🎲 Кости (Craps)</h3>
                    <div style="font-size:40px; margin:20px;">🎲 🎲</div>
                    <button class="btn" onclick="rollDice()">Бросить кости (50 🪙)</button>
                `;
            } else if (gameName === 'Слоты') {
                area.innerHTML = `
                    <h3>🎰 Слоты 777</h3>
                    <div style="font-size:40px; margin:20px;" id="slotDisplay">7 | 7 | 7</div>
                    <button class="btn" onclick="spinSlots()">Крутить слоты (25 🪙)</button>
                `;
            }
        }

        /* Quick Mini Game Functions */
        function spinSlots() {
            const symbols = ['7', '🍒', '🍋', '🔔', '💎'];
            const r1 = symbols[Math.floor(Math.random()*symbols.length)];
            const r2 = symbols[Math.floor(Math.random()*symbols.length)];
            const r3 = symbols[Math.floor(Math.random()*symbols.length)];
            document.getElementById('slotDisplay').innerText = `${r1} | ${r2} | ${r3}`;
            if(r1 === r2 && r2 === r3) {
                confetti();
                alert('🎉 ДЖЕКПОТ!');
            }
        }

        function rollDice() {
            const d1 = Math.floor(Math.random()*6) + 1;
            const d2 = Math.floor(Math.random()*6) + 1;
            alert(`Выпало: ${d1} и ${d2} (Сумма: ${d1+d2})`);
        }

        function spinRoulette() {
            const win = Math.random() > 0.5;
            alert(win ? "🎉 Выпало КРАСНОЕ! Вы выиграли!" : "🪦 Выпало ЧЕРНОЕ! Ставка сгорела.");
        }
    </script>
</body>
</html>
